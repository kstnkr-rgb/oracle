<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Натальная карта — AstroAPI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05050f; --gold: #c9a84c; --gold2: #e8c97a;
      --silver: #a8b5c8; --text: #dde4f0; --text-dim: #7a869a;
      --border: rgba(201,168,76,0.18); --glow: rgba(201,168,76,0.12);
    }
    body { font-family: 'Cormorant Garamond', serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 22%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 5%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 78% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 18%, rgba(255,255,255,0.7) 0%, transparent 100%); }
    .nebula { position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(80,40,120,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 70%, rgba(40,60,120,0.12) 0%, transparent 70%); }
    .container { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 60px 24px 80px; }
    header { text-align: center; margin-bottom: 56px; }
    .sigil { width: 72px; height: 72px; margin: 0 auto 24px; }
    .sigil svg { width: 100%; height: 100%; animation: rotate 40s linear infinite; }
    @keyframes rotate { to { transform: rotate(360deg); } }
    header h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
    header p { color: var(--silver); font-size: 1.05rem; font-style: italic; opacity: 0.8; }
    .divider { display: flex; align-items: center; gap: 16px; margin: 32px 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity:0.4; }
    .divider span { color: var(--gold); font-size: 1.2rem; opacity: 0.7; }
    .card { background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid var(--border); border-radius: 2px; padding: 40px 40px 36px;
      box-shadow: 0 0 60px var(--glow), inset 0 1px 0 rgba(255,255,255,0.05); position: relative; }
    .corner { position: absolute; color: var(--gold); font-size: 0.7rem; opacity: 0.4; }
    .corner.tl{top:12px;left:16px} .corner.tr{top:12px;right:16px}
    .corner.bl{bottom:12px;left:16px} .corner.br{bottom:12px;right:16px}
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-row.full { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold); opacity: 0.8; }
    input, select { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 1px; padding: 12px 14px; color: var(--text);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s; width: 100%; }
    input:focus, select:focus { border-color: var(--gold); background: rgba(201,168,76,0.05);
      box-shadow: 0 0 20px rgba(201,168,76,0.1); }
    input::placeholder { color: var(--text-dim); font-style: italic; }
    select option { background: #0d0d20; color: var(--text); }
    .hint { font-size: 0.82rem; font-style: italic; color: var(--text-dim); margin-top: 4px; line-height: 1.4; }
    .btn { width:100%; padding:16px 24px;
      background: linear-gradient(135deg, rgba(201,168,76,0.12) 0%, rgba(201,168,76,0.06) 100%);
      border: 1px solid var(--gold); border-radius: 1px; color: var(--gold2);
      font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.25em;
      text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
    .btn:hover { background: linear-gradient(135deg, rgba(201,168,76,0.22) 0%, rgba(201,168,76,0.12) 100%);
      box-shadow: 0 0 30px rgba(201,168,76,0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { display:none; text-align:center; padding:40px; }
    .loading.active { display:block; }
    .orbit { width:56px; height:56px; border:1px solid rgba(201,168,76,0.3); border-top-color:var(--gold);
      border-radius:50%; animation:spin 1.2s linear infinite; margin:0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color:var(--silver); font-style:italic; font-size:0.95rem; }
    .error-box { display:none; padding:16px 20px; border:1px solid rgba(200,60,60,0.3);
      background:rgba(200,60,60,0.05); border-radius:1px; color:#e88;
      font-size:0.9rem; margin-top:20px; line-height:1.5; white-space:pre-wrap; }
    .error-box.active { display:block; }
    .results { display:none; margin-top:40px; animation:fadeUp 0.6s ease; }
    .results.active { display:block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .results-header { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.2em;
      text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:16px; }
    .tabs { display:flex; gap:2px; margin-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .tab-btn { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.15em; text-transform:uppercase;
      padding:10px 18px; color:var(--text-dim); background:none; border:none; cursor:pointer;
      border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.3s; }
    .tab-btn.active { color:var(--gold2); border-bottom-color:var(--gold); }
    .tab-content { display:none; } .tab-content.active { display:block; }
    .planets-grid { display:grid; gap:8px; }
    .planet-row { display:grid; grid-template-columns:36px 150px 1fr auto; gap:12px; align-items:center;
      padding:10px 16px; background:rgba(255,255,255,0.02); border:1px solid rgba(201,168,76,0.08);
      border-radius:1px; transition:border-color 0.2s; }
    .planet-row:hover { border-color:rgba(201,168,76,0.2); }
    .psym { font-size:1.3rem; text-align:center; }
    .pname { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--silver); }
    .psign { color:var(--gold2); font-size:0.95rem; }
    .pdeg { color:var(--text-dim); font-size:0.82rem; font-style:italic; white-space:nowrap; }
    .retro { color:#e08080; font-size:0.68rem; font-family:'Cinzel',serif; margin-left:4px; }
    .houses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
    .house-cell { padding:14px 16px; background:rgba(255,255,255,0.02); border:1px solid rgba(201,168,76,0.1); border-radius:1px; text-align:center; }
    .hnum { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.18em; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
    .hsign { font-size:1.1rem; color:var(--gold2); }
    .hdeg { font-size:0.78rem; color:var(--text-dim); font-style:italic; }
    .aspects-list { display:grid; gap:8px; }
    .asp-item { display:flex; align-items:center; gap:12px; padding:10px 16px;
      background:rgba(255,255,255,0.02); border:1px solid rgba(201,168,76,0.08); border-radius:1px; }
    .asp-type { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.1em; padding:2px 8px;
      border-radius:20px; text-transform:uppercase; min-width:72px; text-align:center; }
    .asp-type.trine{background:rgba(80,200,120,0.12);color:#6dbb8a;border:1px solid rgba(80,200,120,0.2)}
    .asp-type.sextile{background:rgba(80,160,220,0.12);color:#6aaee0;border:1px solid rgba(80,160,220,0.2)}
    .asp-type.conjunction{background:rgba(201,168,76,0.1);color:var(--gold2);border:1px solid var(--border)}
    .asp-type.opposition{background:rgba(220,80,80,0.1);color:#e08080;border:1px solid rgba(220,80,80,0.2)}
    .asp-type.square{background:rgba(200,120,40,0.1);color:#e0a060;border:1px solid rgba(200,120,40,0.2)}
    .asp-type.other{background:rgba(150,100,200,0.1);color:#c0a0e0;border:1px solid rgba(150,100,200,0.2)}
    .asp-planets { color:var(--silver); flex:1; font-size:0.9rem; }
    .asp-orb { color:var(--text-dim); font-size:0.78rem; font-style:italic; }
    .interp-section { margin-bottom:24px; }
    .interp-section h3 { font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:0.18em; color:var(--gold);
      text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid rgba(201,168,76,0.15); }
    .interp-text { line-height:1.9; font-size:1.05rem; color:var(--text); opacity:0.9; }
    .kv-grid { display:grid; gap:8px; }
    .kv-item { display:flex; justify-content:space-between; align-items:baseline; padding:10px 16px;
      background:rgba(255,255,255,0.02); border:1px solid rgba(201,168,76,0.08); border-radius:1px; gap:16px; }
    .kv-key { color:var(--text-dim); font-size:0.85rem; font-style:italic; }
    .kv-val { color:var(--text); font-size:0.95rem; text-align:right; word-break:break-word; max-width:65%; }
    .raw-json { background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.06); border-radius:2px;
      padding:20px; font-family:'Courier New',monospace; font-size:0.78rem; color:#8bc4a8;
      white-space:pre-wrap; word-break:break-all; max-height:500px; overflow-y:auto; line-height:1.6; }
    .raw-json::-webkit-scrollbar{width:6px}
    .raw-json::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:3px}
    .note { font-size:0.8rem; color:var(--text-dim); font-style:italic; margin-top:8px; text-align:center; line-height:1.5; }
    @media(max-width:580px){
      .container{padding:40px 16px 60px} .card{padding:28px 20px 24px}
      .form-row{grid-template-columns:1fr}
      .planet-row{grid-template-columns:32px 1fr auto} .psign{display:none}
    }
  </style>
</head>
<body>
<div class="stars"></div>
<div class="nebula"></div>
<div class="container">
  <header>
    <div class="sigil">
      <svg viewBox="0 0 72 72" fill="none">
        <circle cx="36" cy="36" r="34" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
        <circle cx="36" cy="36" r="26" stroke="#c9a84c" stroke-width="0.4" opacity="0.3"/>
        <line x1="2" y1="36" x2="70" y2="36" stroke="#c9a84c" stroke-width="0.4" opacity="0.2"/>
        <line x1="36" y1="2" x2="36" y2="70" stroke="#c9a84c" stroke-width="0.4" opacity="0.2"/>
        <circle cx="36" cy="36" r="3" fill="#c9a84c" opacity="0.7"/>
        <circle cx="36" cy="10" r="2" fill="#c9a84c" opacity="0.5"/>
        <circle cx="36" cy="62" r="2" fill="#c9a84c" opacity="0.5"/>
        <circle cx="10" cy="36" r="2" fill="#c9a84c" opacity="0.5"/>
        <circle cx="62" cy="36" r="2" fill="#c9a84c" opacity="0.5"/>
      </svg>
    </div>
    <h1>Натальная карта</h1>
    <p>Раскройте тайны небесного свода в момент вашего рождения</p>
  </header>

  <div class="card">
    <span class="corner tl">✦</span><span class="corner tr">✦</span>
    <span class="corner bl">✦</span><span class="corner br">✦</span>

    <div class="field" style="margin-bottom:20px">
      <label>Тип запроса</label>
      <select id="endpoint">
        <option value="/data/positions">Позиции планет</option>
        <option value="/charts/natal">Натальная карта (планеты + дома + аспекты)</option>
      </select>
      <div class="hint" id="endpointHint">Точные позиции планет в знаках зодиака на момент рождения</div>
    </div>

    <div class="divider"><span>✦</span></div>

    <div class="form-row">
      <div class="field">
        <label>Дата рождения</label>
        <input type="date" id="birthDate" />
      </div>
      <div class="field">
        <label>Время рождения</label>
        <input type="time" id="birthTime" value="12:00" />
      </div>
    </div>

    <div class="form-row" style="grid-template-columns:2fr 1fr; margin-bottom:20px">
      <div class="field">
        <label>Город рождения</label>
        <input type="text" id="birthCity" placeholder="Moscow" />
      </div>
      <div class="field">
        <label>Код страны</label>
        <input type="text" id="birthCountry" placeholder="RU" maxlength="2" />
      </div>
    </div>
    <p class="note" style="margin-top:-10px;margin-bottom:16px">RU · DE · US · GB · FR · UA · KZ</p>

    <div class="field" style="margin-bottom:20px">
      <label>Имя (необязательно)</label>
      <input type="text" id="personName" placeholder="Введите имя" />
    </div>

    <button class="btn" id="submitBtn" onclick="fetchChart()">✦ &nbsp; Открыть небесный свиток &nbsp; ✦</button>

    <div class="loading" id="loading">
      <div class="orbit"></div>
      <p>Считываю звёздные координаты…</p>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="results" id="results">
    <div class="divider" style="margin:40px 0 32px"><span>✦</span></div>
    <div class="results-header">✦ &nbsp; Ответ небесного свода &nbsp; ✦</div>
    <div class="tabs" id="tabsRow"></div>
    <div id="tabContents"></div>
  </div>
</div>

<script>
  const HINTS = {
    '/data/positions': 'Точные позиции планет в знаках зодиака на момент рождения',
    '/charts/natal': 'Полная натальная карта: планеты, 12 домов и аспекты',
    '/charts/natal/interpretation': 'Текстовая AI-интерпретация натальной карты'
  };
  document.getElementById('endpoint').addEventListener('change', function() {
    document.getElementById('endpointHint').textContent = HINTS[this.value] || '';
  });
  document.getElementById('birthCountry').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });

  async function fetchChart() {
    const apiPath = document.getElementById('endpoint').value;
    const btn = document.getElementById('submitBtn');
    const errBox = document.getElementById('errorBox');
    const results = document.getElementById('results');
    errBox.classList.remove('active');
    results.classList.remove('active');

    const dateVal = document.getElementById('birthDate').value;
    const timeVal = document.getElementById('birthTime').value || '12:00';
    const city = document.getElementById('birthCity').value.trim();
    const country = document.getElementById('birthCountry').value.trim().toUpperCase();
    const name = document.getElementById('personName').value.trim() || 'Subject';

    if (!dateVal || !city || !country) {
      errBox.textContent = 'Заполните дату, город и код страны.';
      errBox.classList.add('active');
      return;
    }

    const [year, month, day] = dateVal.split('-').map(Number);
    const [hour, minute] = timeVal.split(':').map(Number);

    const body = {
      subject: {
        name,
        birth_data: { year, month, day, hour, minute, second: 0, city, country_code: country }
      },
      options: {
        house_system: 'P', language: 'ru', tradition: 'universal',
        detail_level: 'standard', zodiac_type: 'Tropic',
        active_points: ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','Mean_Node','Ascendant','Medium_Coeli'],
        precision: 2
      }
    };

    btn.disabled = true;
    document.getElementById('loading').classList.add('active');

    try {
      // Calls local proxy server — no CORS issues
      const resp = await fetch('/api' + apiPath, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || data.error || data.message || `HTTP ${resp.status}`);
      renderResults(data, apiPath);
      results.classList.add('active');
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      errBox.textContent = 'Ошибка: ' + e.message;
      errBox.classList.add('active');
    } finally {
      btn.disabled = false;
      document.getElementById('loading').classList.remove('active');
    }
  }

  const SYM = { Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇',Chiron:'⚷',Mean_Node:'☊',True_Node:'☊',Ascendant:'Asc',Medium_Coeli:'MC' };
  const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];

  function renderResults(data, apiPath) {
    const tabsRow = document.getElementById('tabsRow');
    const tabContents = document.getElementById('tabContents');
    tabsRow.innerHTML = ''; tabContents.innerHTML = '';
    const tabs = [];
    const planets = data.planets || data.positions || data.celestial_bodies;
    if (planets) tabs.push({ label: 'Планеты', html: renderPlanets(planets) });
    if (data.houses) tabs.push({ label: 'Дома', html: renderHouses(data.houses) });
    if (data.aspects?.length) tabs.push({ label: 'Аспекты', html: renderAspects(data.aspects) });
    const interp = data.interpretation || data.interpretations;
    if (interp) tabs.push({ label: 'Интерпретация', html: renderInterp(interp) });
    if (tabs.length === 0) tabs.push({ label: 'Данные', html: renderKV(flatObj(data)) });
    tabs.push({ label: 'JSON', html: `<pre class="raw-json">${JSON.stringify(data, null, 2)}</pre>` });

    tabs.forEach((tab, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = tab.label;
      btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${i}`).classList.add('active');
      };
      tabsRow.appendChild(btn);
      const div = document.createElement('div');
      div.className = 'tab-content' + (i === 0 ? ' active' : '');
      div.id = `tab-${i}`; div.innerHTML = tab.html;
      tabContents.appendChild(div);
    });
  }

  function renderPlanets(planets) {
    const list = Array.isArray(planets) ? planets : Object.entries(planets).map(([name,v])=>({name,...v}));
    return `<div class="planets-grid">${list.map(p => {
      const sym = SYM[p.name] || '★';
      const sign = p.sign || p.zodiac_sign || '';
      const deg = p.degree !== undefined ? `${Number(p.degree).toFixed(2)}°` : p.abs_pos !== undefined ? `${Number(p.abs_pos).toFixed(2)}°` : '';
      const house = p.house !== undefined ? `· Дом ${p.house}` : '';
      const retro = (p.retrograde || p.is_retrograde) ? '<span class="retro">℞</span>' : '';
      return `<div class="planet-row"><div class="psym">${sym}</div><div class="pname">${p.name||''}${retro}</div><div class="psign">${sign} ${house}</div><div class="pdeg">${deg}</div></div>`;
    }).join('')}</div>`;
  }

  function renderHouses(houses) {
    const list = Array.isArray(houses) ? houses : Object.entries(houses).map(([k,v])=>({number:k,...v}));
    return `<div class="houses-grid">${list.map((h,i) => {
      const sign = h.sign || h.zodiac_sign || '';
      const deg = h.degree !== undefined ? `${Number(h.degree).toFixed(1)}°` : h.cusp !== undefined ? `${Number(h.cusp).toFixed(1)}°` : '';
      return `<div class="house-cell"><div class="hnum">Дом ${ROMAN[i]||i+1}</div><div class="hsign">${sign}</div><div class="hdeg">${deg}</div></div>`;
    }).join('')}</div>`;
  }

  function renderAspects(aspects) {
    return `<div class="aspects-list">${aspects.map(a => {
      const type = (a.aspect || a.type || a.name || '').toLowerCase();
      const cls = ['trine','sextile','conjunction','opposition','square'].includes(type) ? type : 'other';
      const p1 = a.p1_name || a.planet1 || a.body1 || '';
      const p2 = a.p2_name || a.planet2 || a.body2 || '';
      const orb = a.orb !== undefined ? `orb ${Number(a.orb).toFixed(2)}°` : '';
      return `<div class="asp-item"><span class="asp-type ${cls}">${type}</span><span class="asp-planets">${p1} — ${p2}</span><span class="asp-orb">${orb}</span></div>`;
    }).join('')}</div>`;
  }

  function renderInterp(interp) {
    if (typeof interp === 'string') return `<div class="interp-section"><p class="interp-text">${interp.replace(/\n/g,'<br/>')}</p></div>`;
    const entries = Array.isArray(interp) ? interp.map((v,i)=>[`${i+1}`,v]) : Object.entries(interp);
    return entries.map(([k,v]) => {
      const text = typeof v === 'string' ? v : (v?.text || v?.description || JSON.stringify(v));
      return `<div class="interp-section"><h3>${k}</h3><p class="interp-text">${String(text).replace(/\n/g,'<br/>')}</p></div>`;
    }).join('');
  }

  function renderKV(obj) {
    return `<div class="kv-grid">${Object.entries(obj).map(([k,v])=>`<div class="kv-item"><span class="kv-key">${k}</span><span class="kv-val">${v}</span></div>`).join('')}</div>`;
  }

  function flatObj(obj, prefix='') {
    const r = {};
    Object.entries(obj).forEach(([k,v]) => {
      const key = prefix ? `${prefix}.${k}` : k;
      if (v && typeof v === 'object' && !Array.isArray(v)) Object.assign(r, flatObj(v, key));
      else if (!Array.isArray(v)) r[key] = v;
    });
    return r;
  }
</script>
</body>
</html>
