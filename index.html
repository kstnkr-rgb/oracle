<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Астрология</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1628;
  --card:#16294a;
  --accent:#4a9eff;
  --accent2:#2d7dd2;
  --text:#e8eef8;
  --text2:#8fa5c9;
  --border:rgba(74,158,255,.18);
  --radius:18px;
  --radius-sm:13px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden}
body{max-width:480px;margin:0 auto;min-height:100vh}
body::before{content:'';position:fixed;top:-20%;left:-20%;width:65%;height:65%;
  background:radial-gradient(ellipse,rgba(45,125,210,.2) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-15%;right:-15%;width:55%;height:55%;
  background:radial-gradient(ellipse,rgba(62,207,142,.1) 0%,transparent 70%);pointer-events:none;z-index:0}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;max-width:480px;margin:0 auto;
  background:var(--bg);display:flex;flex-direction:column;
  transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s;
  z-index:1;overflow-y:auto}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}

/* ── NAV ── */
.nav{display:flex;align-items:center;gap:14px;padding:52px 20px 16px;flex-shrink:0}
.nav-back{width:38px;height:38px;border-radius:50%;background:var(--card);
  border:1px solid var(--border);color:var(--text);font-size:1.3rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-title{font-family:'Philosopher',serif;font-size:1.15rem;font-weight:700;letter-spacing:.05em}

/* ── HOME ── */
.home-header{padding:60px 24px 32px;flex-shrink:0}
.home-logo{font-size:2.8rem;margin-bottom:12px}
.home-title{font-family:'Philosopher',serif;font-size:1.9rem;font-weight:700;line-height:1.2;margin-bottom:8px}
.home-sub{color:var(--text2);font-size:.95rem;line-height:1.5}

.menu{padding:0 16px 40px;display:flex;flex-direction:column;gap:14px}
.menu-btn{display:flex;align-items:center;gap:18px;padding:22px 22px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .2s;text-align:left;width:100%}
.menu-btn:active{transform:scale(.98);background:#1e3566}
.menu-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;
  justify-content:center;font-size:1.6rem;flex-shrink:0}
.menu-icon.blue{background:linear-gradient(135deg,#1e5bbd,#4a9eff)}
.menu-icon.green{background:linear-gradient(135deg,#166a4a,#3ecf8e)}
.menu-text{}
.menu-label{font-size:1.05rem;font-weight:800;color:var(--text);margin-bottom:3px}
.menu-desc{font-size:.82rem;color:var(--text2);line-height:1.4}
.menu-arrow{margin-left:auto;color:var(--text2);font-size:1.1rem;flex-shrink:0}

/* ── FORM SCREEN ── */
.form-body{padding:8px 20px 40px;display:flex;flex-direction:column;gap:14px;flex:1}

.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.field input,.field select{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:15px 16px;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:600;outline:none;width:100%;
  transition:border-color .2s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text2);font-weight:400}
.field select option{background:#1a3058}

.sbtn{padding:17px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;box-shadow:0 6px 24px rgba(74,158,255,.35);
  transition:all .2s;width:100%;margin-top:4px}
.sbtn:active{transform:scale(.98)}
.sbtn:disabled{opacity:.45;cursor:not-allowed}

/* ── SPINNER ── */
.spin{display:none;text-align:center;padding:28px 0}.spin.on{display:block}
.orbit-ring{width:44px;height:44px;border:2px solid rgba(74,158,255,.2);border-top-color:var(--accent);
  border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.spin p{color:var(--text2);font-size:.9rem}

.eb{display:none;padding:13px 16px;border-radius:var(--radius-sm);
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  color:#fca5a5;font-size:.86rem;line-height:1.5}
.eb.on{display:block}

/* ── RESULTS ── */
.res{display:none}.res.on{display:block}
.rtabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}
.rtabs::-webkit-scrollbar{display:none}
.rtab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-family:'Nunito',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s}
.rtab.on{background:rgba(74,158,255,.15);border-color:var(--accent);color:var(--accent)}
.rtc{display:none}.rtc.on{display:block}

/* ── PLANET LIST ── */
.plist{display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:center;gap:12px;padding:13px 15px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm)}
.psym{font-size:1.3rem;width:28px;text-align:center;flex-shrink:0}
.pinfo{flex:1}
.pname{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.psign{font-size:.97rem;font-weight:700}
.pdeg{font-size:.8rem;color:var(--text2);font-weight:600}
.retro{color:#f97316;font-size:.6rem;font-weight:800;margin-left:3px}

/* ── HOUSES ── */
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hcell{padding:12px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center}
.hnum{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:4px}
.hsign{font-size:.9rem;font-weight:700}
.hdeg{font-size:.7rem;color:var(--text2)}

/* ── ASPECTS ── */
.alist{display:flex;flex-direction:column;gap:7px}
.arow{display:flex;align-items:center;gap:10px;padding:10px 13px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm)}
.abadge{font-size:.58rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  padding:3px 8px;border-radius:10px;flex-shrink:0;min-width:56px;text-align:center}
.abadge.trine{background:rgba(62,207,142,.15);color:#3ecf8e;border:1px solid rgba(62,207,142,.25)}
.abadge.sextile{background:rgba(74,158,255,.15);color:#4a9eff;border:1px solid rgba(74,158,255,.25)}
.abadge.conjunction{background:rgba(245,200,66,.15);color:#f5c842;border:1px solid rgba(245,200,66,.25)}
.abadge.opposition{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.abadge.square{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
.abadge.other{background:rgba(168,130,220,.12);color:#c084fc;border:1px solid rgba(168,130,220,.2)}
.apair{flex:1;font-size:.87rem;font-weight:600}
.aorb{font-size:.75rem;color:var(--text2)}

/* ── HOROSCOPE ── */
.horo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px}
.horo-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.horo-title{font-family:'Philosopher',serif;font-size:1.1rem;font-weight:700}
.horo-stars{color:#f5c842;font-size:.95rem;letter-spacing:2px}
.horo-theme{font-style:italic;color:var(--text2);font-size:.9rem;line-height:1.65;
  padding:12px 14px;background:rgba(74,158,255,.07);border-left:3px solid var(--accent);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:14px}
.horo-areas{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.horo-area{padding:13px 15px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius-sm)}
.horo-area-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:5px}
.horo-area-text{font-size:.9rem;line-height:1.65}
.horo-moon{display:flex;align-items:center;gap:14px;padding:13px 15px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px}
.horo-moon-emoji{font-size:2.1rem}
.horo-moon-phase{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:3px}
.horo-moon-pred{font-size:.87rem;line-height:1.55}
.horo-lucky{display:flex;gap:8px;flex-wrap:wrap}
.horo-lucky-item{padding:6px 12px;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.18);
  border-radius:20px;font-size:.78rem;font-weight:700;color:#f5c842}
.horo-lucky-item span{color:var(--text)}

.rjson{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);
  padding:14px;font-family:'Courier New',monospace;font-size:.68rem;color:#6ee7b7;
  white-space:pre-wrap;word-break:break-all;max-height:380px;overflow-y:auto;line-height:1.6}
.kvlist{display:flex;flex-direction:column;gap:6px}
.kvrow{display:flex;justify-content:space-between;gap:10px;padding:8px 12px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm)}
.kvk{font-size:.74rem;color:var(--text2);font-weight:600;flex-shrink:0}
.kvv{font-size:.85rem;font-weight:600;text-align:right;word-break:break-word}
</style>
</head>
<body>

<!-- ══════════════ ГЛАВНЫЙ ЭКРАН ══════════════ -->
<div class="screen" id="s-home">
  <div class="home-header">
    <div class="home-logo">🔮</div>
    <div class="home-title">Астрология</div>
    <div class="home-sub">Натальная карта и персональный гороскоп</div>
  </div>
  <div class="menu">
    <button class="menu-btn" onclick="open('natal')">
      <div class="menu-icon blue">☉</div>
      <div class="menu-text">
        <div class="menu-label">Натальная карта</div>
        <div class="menu-desc">Позиции планет, дома и аспекты по дате рождения</div>
      </div>
      <div class="menu-arrow">›</div>
    </button>
    <button class="menu-btn" onclick="open('horoscope')">
      <div class="menu-icon green">☽</div>
      <div class="menu-text">
        <div class="menu-label">Гороскоп</div>
        <div class="menu-desc">Астрологический прогноз на выбранную дату</div>
      </div>
      <div class="menu-arrow">›</div>
    </button>
  </div>
</div>

<!-- ══════════════ НАТАЛЬНАЯ КАРТА ══════════════ -->
<div class="screen hidden" id="s-natal">
  <div class="nav">
    <button class="nav-back" onclick="back()">‹</button>
    <div class="nav-title">Натальная карта</div>
  </div>
  <div class="form-body">
    <div class="field">
      <label>Тип расчёта</label>
      <select id="n-type">
        <option value="all">Полная карта (планеты + дома + аспекты)</option>
        <option value="positions">Позиции планет</option>
        <option value="house-cusps">Дома (куспиды)</option>
        <option value="aspects">Аспекты</option>
      </select>
    </div>
    <div class="field">
      <label>Дата рождения</label>
      <input type="date" id="n-date"/>
    </div>
    <div class="field">
      <label>Время рождения</label>
      <input type="time" id="n-time" value="12:00"/>
    </div>
    <div class="field">
      <label>Город рождения</label>
      <input type="text" id="n-city" placeholder="Moscow"/>
    </div>
    <div class="field">
      <label>Страна (код)</label>
      <input type="text" id="n-country" placeholder="RU" maxlength="2"/>
    </div>
    <div class="field">
      <label>Имя</label>
      <input type="text" id="n-name" placeholder="Имя (необязательно)"/>
    </div>
    <button class="sbtn" onclick="doNatal()">Рассчитать</button>
    <div class="spin" id="sp-natal"><div class="orbit-ring"></div><p>Считываю звёздные координаты…</p></div>
    <div class="eb" id="er-natal"></div>
    <div class="res" id="res-natal"></div>
  </div>
</div>

<!-- ══════════════ ГОРОСКОП ══════════════ -->
<div class="screen hidden" id="s-horoscope">
  <div class="nav">
    <button class="nav-back" onclick="back()">‹</button>
    <div class="nav-title">Гороскоп</div>
  </div>
  <div class="form-body">
    <div class="field">
      <label>Дата рождения</label>
      <input type="date" id="h-bdate"/>
    </div>
    <div class="field">
      <label>Дата прогноза</label>
      <input type="date" id="h-date"/>
    </div>
    <div class="field">
      <label>Традиция</label>
      <select id="h-tradition">
        <option value="universal">Универсальная</option>
        <option value="psychological">Психологическая</option>
        <option value="classical">Классическая</option>
      </select>
    </div>
    <button class="sbtn" onclick="doHoroscope()">Получить гороскоп</button>
    <div class="spin" id="sp-horoscope"><div class="orbit-ring"></div><p>Читаю звёздные послания…</p></div>
    <div class="eb" id="er-horoscope"></div>
    <div class="res" id="res-horoscope"></div>
  </div>
</div>

<script>
// ── НАВИГАЦИЯ ──────────────────────────────────
let current='home';
function open(screen){
  document.getElementById('s-'+current).classList.add('hidden');
  document.getElementById('s-'+screen).classList.remove('hidden');
  document.getElementById('s-'+screen).scrollTop=0;
  current=screen;
}
function back(){open('home')}

// ── ДАННЫЕ ────────────────────────────────────
const SYM={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇',Chiron:'⚷',Mean_Node:'☊',True_Node:'☊',Ascendant:'Asc',Medium_Coeli:'MC'};
const ROMAN=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
const SIGN_RU={Ari:'Овен',Tau:'Телец',Gem:'Близнецы',Can:'Рак',Leo:'Лев',Vir:'Дева',Lib:'Весы',Sco:'Скорпион',Sag:'Стрелец',Cap:'Козерог',Aqu:'Водолей',Pis:'Рыбы'};
const MOON_EMOJI={'New Moon':'🌑','Waxing Crescent':'🌒','First Quarter':'🌓','Waxing Gibbous':'🌔','Full Moon':'🌕','Waning Gibbous':'🌖','Last Quarter':'🌗','Waning Crescent':'🌘'};

function birthSign(dateStr){
  if(!dateStr)return'Ari';
  const[,m,d]=dateStr.split('-').map(Number);
  const cuts=[[3,21,'Ari'],[4,20,'Tau'],[5,21,'Gem'],[6,21,'Can'],[7,23,'Leo'],[8,23,'Vir'],[9,23,'Lib'],[10,23,'Sco'],[11,22,'Sag'],[12,22,'Cap'],[1,20,'Aqu'],[2,19,'Pis']];
  for(let i=0;i<cuts.length;i++){
    const[cm,cd,s]=cuts[i];const[nm,nd]=cuts[(i+1)%cuts.length];
    if(m===cm&&d>=cd)return s;
    if(m===nm&&d<nd)return s;
  }
  return'Cap';
}

function g(id){return(document.getElementById(id)?.value||'').trim()}
function subj(date,time,city,co,name){
  const[y,mo,d]=date.split('-').map(Number);
  const[h,mi]=(time||'12:00').split(':').map(Number);
  return{name:name||'Subject',birth_data:{year:y,month:mo,day:d,hour:h,minute:mi,second:0,city,country_code:co.toUpperCase()}};
}
const OPT={house_system:'P',language:'ru',tradition:'universal',detail_level:'standard',zodiac_type:'Tropic',
  active_points:['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','Mean_Node','Ascendant','Medium_Coeli'],precision:2};

async function api(path,payload,extra={}){
  const r=await fetch('/proxy',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({apiPath:path,payload,...extra})});
  const txt=await r.text();
  let d;try{d=JSON.parse(txt)}catch(e){throw new Error('Ответ сервера: '+txt.substring(0,200))}
  if(!r.ok){const m=d.detail||d.error||d.message;throw new Error(typeof m==='string'?m:JSON.stringify(m).substring(0,200))}
  return d;
}

function spin(id,on){document.getElementById('sp-'+id).classList.toggle('on',on)}
function err(id,msg){const e=document.getElementById('er-'+id);e.textContent=msg;e.classList.toggle('on',!!msg)}
async function run(id,fn){
  err(id,'');spin(id,true);
  document.getElementById('res-'+id).classList.remove('on');
  const btn=document.querySelector('#s-'+id+' .sbtn');if(btn)btn.disabled=true;
  try{await fn()}catch(e){err(id,'Ошибка: '+e.message)}
  finally{spin(id,false);if(btn)btn.disabled=false}
}

document.querySelectorAll('input[maxlength="2"]').forEach(el=>el.addEventListener('input',()=>{el.value=el.value.toUpperCase()}));

// ── НАТАЛЬНАЯ КАРТА ────────────────────────────
async function doNatal(){await run('natal',async()=>{
  const type=g('n-type')||'all',date=g('n-date'),city=g('n-city'),co=g('n-country');
  if(!date||!city||!co)throw new Error('Заполните дату, город и страну');
  const s=subj(date,g('n-time'),city,co,g('n-name'));
  let data;
  if(type==='all'){
    const[pos,houses,asp]=await Promise.all([
      api('/api/v3/data/positions',{subject:s,options:OPT}),
      api('/api/v3/data/house-cusps',{subject:s,options:OPT}),
      api('/api/v3/data/aspects',{subject:s,options:OPT})
    ]);
    data={positions:pos,houses:houses,aspects:asp};
  }else{
    data=await api('/api/v3/data/'+type,{subject:s,options:OPT});
  }
  showNatal(data);
})}

// ── ГОРОСКОП ────────────────────────────────────
async function doHoroscope(){await run('horoscope',async()=>{
  const bdate=g('h-bdate');
  if(!bdate)throw new Error('Укажите дату рождения');
  const sign=birthSign(bdate);
  const dateVal=g('h-date')||new Date().toISOString().slice(0,10);
  const tradition=document.getElementById('h-tradition').value;
  const path='/api/v3/pdf/horoscope/data/'+sign+'/'+dateVal+'?language=ru&tradition='+tradition;
  const data=await api(path,{},{method:'GET'});
  showHoroscope(data);
})}

// ── РЕНДЕР НАТАЛЬНОЙ КАРТЫ ─────────────────────
function showNatal(data){
  const T=[];
  if(data.positions||data.houses||data.aspects){
    const pos=data.positions?.data||data.positions;
    const hd=data.houses?.data||data.houses;
    const asd=data.aspects?.data||data.aspects;
    if(pos){const pl=plArr(pos);if(pl.length)T.push({l:'Планеты',h:rPl(pl)})}
    if(hd){const hs=hsArr(hd);if(hs.length)T.push({l:'Дома',h:rH(hs)})}
    if(asd){const as=asd.aspects;if(as?.length)T.push({l:'Аспекты',h:rA(as)})}
  }else{
    const inner=data.data||data;
    const pl=plArr(inner);if(pl.length)T.push({l:'Планеты',h:rPl(pl)});
    const hs=hsArr(inner);if(hs.length)T.push({l:'Дома',h:rH(hs)});
    const as=inner.aspects;if(as?.length)T.push({l:'Аспекты',h:rA(as)});
  }
  if(!T.length)T.push({l:'Данные',h:rKV(flat(data.data||data))});
  T.push({l:'JSON',h:'<pre class="rjson">'+JSON.stringify(data,null,2)+'</pre>'});
  buildRes('natal',T);
}

// ── РЕНДЕР ГОРОСКОПА ───────────────────────────
function showHoroscope(data){
  const T=[{l:'Гороскоп',h:rHoroData(data.data||data)}];
  T.push({l:'JSON',h:'<pre class="rjson">'+JSON.stringify(data,null,2)+'</pre>'});
  buildRes('horoscope',T);
}

function buildRes(id,T){
  const el=document.getElementById('res-'+id);
  el.innerHTML='';
  const tabs=document.createElement('div');tabs.className='rtabs';
  T.forEach((t,i)=>{
    const b=document.createElement('button');b.className='rtab'+(i===0?' on':'');b.textContent=t.l;
    b.onclick=()=>{el.querySelectorAll('.rtab').forEach(x=>x.classList.remove('on'));
      el.querySelectorAll('.rtc').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');el.querySelector('#rtc_'+id+i).classList.add('on')};
    tabs.appendChild(b);
  });
  el.appendChild(tabs);
  T.forEach((t,i)=>{
    const dv=document.createElement('div');dv.className='rtc'+(i===0?' on':'');dv.id='rtc_'+id+i;dv.innerHTML=t.h;el.appendChild(dv);
  });
  el.classList.add('on');
  setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

// ── ВСПОМОГАТЕЛЬНЫЕ ────────────────────────────
function plArr(obj){
  if(!obj)return[];
  const pl=obj.positions||obj.planets||obj.celestial_bodies;
  if(Array.isArray(pl))return pl;
  if(pl&&typeof pl==='object')return Object.entries(pl).map(([n,v])=>({name:n,...v}));
  return[];
}
function hsArr(obj){
  if(!obj)return[];
  const hs=obj.houses||obj.house_cusps;
  if(Array.isArray(hs))return hs;
  if(hs&&typeof hs==='object')return Object.values(hs);
  return[];
}
function sru(s){return SIGN_RU[s]||s||''}
function rPl(list){
  return '<div class="plist">'+list.map(p=>{
    const sym=SYM[p.name]||'★';
    const sign=sru(p.sign||p.zodiac_sign);
    const deg=p.degree!=null?Number(p.degree).toFixed(1)+'°':p.absolute_longitude!=null?Number(p.absolute_longitude).toFixed(1)+'°':'';
    const house=p.house!=null?' · д.'+p.house:'';
    const retro=(p.retrograde||p.is_retrograde)?'<span class="retro">℞</span>':'';
    return`<div class="prow"><div class="psym">${sym}</div><div class="pinfo"><div class="pname">${p.name||''}${retro}</div><div class="psign">${sign}${house}</div></div><div class="pdeg">${deg}</div></div>`;
  }).join('')+'</div>';
}
function rH(list){
  return '<div class="hgrid">'+list.map((x,i)=>{
    const sign=sru(x.sign||x.zodiac_sign);
    const deg=x.degree!=null?Number(x.degree).toFixed(1)+'°':x.absolute_longitude!=null?Number(x.absolute_longitude).toFixed(1)+'°':'';
    return`<div class="hcell"><div class="hnum">Дом ${ROMAN[i]||i+1}</div><div class="hsign">${sign}</div><div class="hdeg">${deg}</div></div>`;
  }).join('')+'</div>';
}
function rA(asp){
  return '<div class="alist">'+asp.map(a=>{
    const type=(a.aspect||a.type||a.name||'').toLowerCase();
    const cls=['trine','sextile','conjunction','opposition','square'].includes(type)?type:'other';
    const p1=a.p1_name||a.planet1||a.body1||'';
    const p2=a.p2_name||a.planet2||a.body2||'';
    const orb=a.orb!=null?Number(a.orb).toFixed(1)+'°':'';
    return`<div class="arow"><span class="abadge ${cls}">${type}</span><span class="apair">${p1} — ${p2}</span><span class="aorb">${orb}</span></div>`;
  }).join('')+'</div>';
}
function rKV(obj){return'<div class="kvlist">'+Object.entries(obj).map(([k,v])=>`<div class="kvrow"><span class="kvk">${k}</span><span class="kvv">${v}</span></div>`).join('')+'</div>'}
function flat(obj,p=''){
  const r={};if(!obj||typeof obj!=='object')return r;
  Object.entries(obj).forEach(([k,v])=>{
    const key=p?p+'.'+k:k;
    if(v&&typeof v==='object'&&!Array.isArray(v))Object.assign(r,flat(v,key));
    else if(!Array.isArray(v)&&v!=null)r[key]=String(v);
  });return r;
}
function rHoroData(d){
  const stars=d.overall_rating?'★'.repeat(d.overall_rating)+'☆'.repeat(5-d.overall_rating):'';
  const signName=SIGN_RU[d.sign]||d.sign||'';
  let h='<div class="horo-card">';
  h+=`<div class="horo-header"><div class="horo-title">${signName}${d.date?' · '+d.date:''}</div>${stars?'<div class="horo-stars">'+stars+'</div>':''}</div>`;
  if(d.overall_theme)h+=`<div class="horo-theme">${d.overall_theme}</div>`;
  const areas=[
    {k:'love',icon:'♀',label:'Любовь и отношения'},
    {k:'career',icon:'♃',label:'Карьера'},
    {k:'health',icon:'☽',label:'Здоровье'},
    {k:'finance',icon:'☿',label:'Финансы'},
    {k:'spirituality',icon:'✦',label:'Духовность'},
    {k:'family',icon:'♄',label:'Семья'},
  ];
  const filled=areas.filter(a=>d[a.k]||d[a.k+'.prediction']||d[a.k+'.theme']);
  if(filled.length){
    h+='<div class="horo-areas">';
    filled.forEach(a=>{
      const text=d[a.k]||d[a.k+'.prediction']||d[a.k+'.theme']||'';
      h+=`<div class="horo-area"><div class="horo-area-title">${a.icon} ${a.label}</div><div class="horo-area-text">${text}</div></div>`;
    });
    h+='</div>';
  }
  const moonPhase=d['moon.phase']||d.moon_phase||'';
  const moonSign=d['moon.sign']||d.moon_sign||'';
  const moonPred=d['moon.prediction']||'';
  if(moonPhase||moonSign){
    const emoji=MOON_EMOJI[moonPhase]||d['moon.emoji']||'🌙';
    h+=`<div class="horo-moon"><div class="horo-moon-emoji">${emoji}</div><div><div class="horo-moon-phase">${moonPhase}${moonSign?' · '+moonSign:''}</div>${moonPred?'<div class="horo-moon-pred">'+moonPred+'</div>':''}</div></div>`;
  }
  const lucky=[];
  if(d['lucky_elements.day_ruler'])lucky.push('Правитель дня: <span>'+d['lucky_elements.day_ruler']+'</span>');
  if(d['lucky_elements.number'])lucky.push('Число: <span>'+d['lucky_elements.number']+'</span>');
  if(d['lucky_elements.color'])lucky.push('Цвет: <span>'+d['lucky_elements.color']+'</span>');
  if(lucky.length)h+='<div class="horo-lucky">'+lucky.map(l=>'<div class="horo-lucky-item">'+l+'</div>').join('')+'</div>';
  if(!filled.length&&!moonPhase&&!d.overall_theme)h='<div class="horo-card">'+rKV(flat(d))+'</div>';
  else h+='</div>';
  return h;
}
