<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AstroAPI — Небесный свод</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05050f;--gold:#c9a84c;--gold2:#e8c97a;--silver:#a8b5c8;--text:#dde4f0;--dim:#7a869a;--border:rgba(201,168,76,.18);--glow:rgba(201,168,76,.10);--card:rgba(255,255,255,.025)}
body{font-family:'Cormorant Garamond',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:
  radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.8) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 38% 7%,rgba(255,255,255,.9) 0%,transparent 100%),
  radial-gradient(1px 1px at 53% 20%,rgba(255,255,255,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 68% 33%,rgba(255,255,255,.7) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 83% 4%,rgba(255,255,255,.8) 0%,transparent 100%),
  radial-gradient(1px 1px at 14% 58%,rgba(255,255,255,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 58% 73%,rgba(255,255,255,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 89% 53%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 33% 83%,rgba(255,255,255,.7) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 76% 88%,rgba(255,255,255,.6) 0%,transparent 100%)}
.nebula{position:fixed;inset:0;pointer-events:none;z-index:0;background:
  radial-gradient(ellipse 60% 40% at 20% 30%,rgba(80,40,120,.15) 0%,transparent 70%),
  radial-gradient(ellipse 40% 60% at 80% 70%,rgba(40,60,120,.12) 0%,transparent 70%)}
.wrap{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:52px 22px 80px}

header{text-align:center;margin-bottom:42px}
.sigil{width:58px;height:58px;margin:0 auto 16px}
.sigil svg{width:100%;height:100%;animation:rot 40s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
h1{font-family:'Cinzel',serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:600;letter-spacing:.12em;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
header p{color:var(--silver);font-size:.98rem;font-style:italic;opacity:.8}

.mbar{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:24px;border-bottom:1px solid var(--border)}
.mb{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;
  padding:10px 18px;color:var(--dim);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .3s;white-space:nowrap}
.mb.on{color:var(--gold2);border-bottom-color:var(--gold)}
.mb:hover{color:var(--silver)}
.panel{display:none}.panel.on{display:block}

.card{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:30px 34px 26px;box-shadow:0 0 48px var(--glow);position:relative}
.c{position:absolute;color:var(--gold);font-size:.6rem;opacity:.3}
.c.tl{top:8px;left:12px}.c.tr{top:8px;right:12px}.c.bl{bottom:8px;left:12px}.c.br{bottom:8px;right:12px}

.row{display:grid;gap:13px;margin-bottom:13px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:2fr 1fr 1fr}.r2e{grid-template-columns:1fr 1fr}
.f{display:flex;flex-direction:column;gap:5px}
label{font-family:'Cinzel',serif;font-size:.57rem;letter-spacing:.19em;text-transform:uppercase;color:var(--gold);opacity:.76}
input,select{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.2);border-radius:1px;
  padding:9px 11px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:.93rem;
  outline:none;transition:border-color .3s,box-shadow .3s;width:100%}
input:focus,select:focus{border-color:var(--gold);background:rgba(201,168,76,.04);box-shadow:0 0 14px rgba(201,168,76,.1)}
input::placeholder{color:var(--dim);font-style:italic}
select option{background:#0d0d20;color:var(--text)}
.note{font-size:.76rem;color:var(--dim);font-style:italic;line-height:1.5;margin-top:2px}
.div{display:flex;align-items:center;gap:11px;margin:16px 0}
.div::before,.div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.28}
.div span{color:var(--gold);font-size:.85rem;opacity:.5}

.btn{width:100%;padding:13px 16px;margin-top:5px;
  background:linear-gradient(135deg,rgba(201,168,76,.11) 0%,rgba(201,168,76,.05) 100%);
  border:1px solid var(--gold);border-radius:1px;color:var(--gold2);
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;
  cursor:pointer;transition:all .3s}
.btn:hover{background:linear-gradient(135deg,rgba(201,168,76,.21) 0%,rgba(201,168,76,.11) 100%);box-shadow:0 0 24px rgba(201,168,76,.16)}
.btn:disabled{opacity:.38;cursor:not-allowed}

.spin{display:none;text-align:center;padding:28px 0}.spin.on{display:block}
.orbit{width:42px;height:42px;border:1px solid rgba(201,168,76,.3);border-top-color:var(--gold);border-radius:50%;animation:sp 1.2s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.spin p{color:var(--silver);font-style:italic;font-size:.92rem}
.eb{display:none;padding:11px 15px;border:1px solid rgba(200,60,60,.3);background:rgba(200,60,60,.05);border-radius:1px;color:#e88;font-size:.84rem;margin-top:12px;line-height:1.5;white-space:pre-wrap}
.eb.on{display:block}

.res{display:none;margin-top:30px;animation:fu .5s ease}.res.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.19em;text-transform:uppercase;color:var(--gold);opacity:.6;margin-bottom:11px}
.tabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:14px}
.tb{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;
  padding:7px 13px;color:var(--dim);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .3s}
.tb.on{color:var(--gold2);border-bottom-color:var(--gold)}
.tc{display:none}.tc.on{display:block}

.pg{display:grid;gap:6px}
.pr{display:grid;grid-template-columns:30px 150px 1fr auto;gap:8px;align-items:center;
  padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.08);border-radius:1px;transition:border-color .2s}
.pr:hover{border-color:rgba(201,168,76,.2)}
.ps{font-size:1.2rem;text-align:center}
.pn{font-family:'Cinzel',serif;font-size:.61rem;letter-spacing:.09em;text-transform:uppercase;color:var(--silver)}
.psg{color:var(--gold2);font-size:.88rem}
.pd{color:var(--dim);font-size:.76rem;font-style:italic;white-space:nowrap}
.rt{color:#e08080;font-size:.6rem;margin-left:3px}

.hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:7px}
.hc{padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.1);border-radius:1px;text-align:center}
.hn{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.hsg{font-size:.94rem;color:var(--gold2)}
.hd{font-size:.72rem;color:var(--dim);font-style:italic}

.al{display:grid;gap:6px}
.ai{display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.08);border-radius:1px}
.at{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.07em;padding:2px 6px;border-radius:20px;text-transform:uppercase;min-width:64px;text-align:center}
.at.trine{background:rgba(80,200,120,.12);color:#6dbb8a;border:1px solid rgba(80,200,120,.2)}
.at.sextile{background:rgba(80,160,220,.12);color:#6aaee0;border:1px solid rgba(80,160,220,.2)}
.at.conjunction{background:rgba(201,168,76,.1);color:var(--gold2);border:1px solid var(--border)}
.at.opposition{background:rgba(220,80,80,.1);color:#e08080;border:1px solid rgba(220,80,80,.2)}
.at.square{background:rgba(200,120,40,.1);color:#e0a060;border:1px solid rgba(200,120,40,.2)}
.at.other{background:rgba(150,100,200,.1);color:#c0a0e0;border:1px solid rgba(150,100,200,.2)}
.ap{color:var(--silver);flex:1;font-size:.84rem}
.ao{color:var(--dim);font-size:.72rem;font-style:italic}

.hcard{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:1px;padding:22px 26px}
.htitle{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--gold2);margin-bottom:14px;letter-spacing:.1em}
.hcats{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;margin-bottom:12px}
.hcat{padding:11px 13px;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.1);border-radius:1px}
.hcatn{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.hcatt{font-size:.88rem;line-height:1.65;color:var(--text);opacity:.9}
.hlk{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.hlki{font-size:.82rem;color:var(--dim)}.hlki span{color:var(--gold2)}

.kvg{display:grid;gap:6px}
.kvi{display:flex;justify-content:space-between;align-items:baseline;padding:7px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.08);border-radius:1px;gap:11px}
.kvk{color:var(--dim);font-size:.79rem;font-style:italic;flex-shrink:0}
.kvv{color:var(--text);font-size:.89rem;text-align:right;word-break:break-word}
.rj{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.06);border-radius:2px;padding:15px;font-family:'Courier New',monospace;font-size:.73rem;color:#8bc4a8;white-space:pre-wrap;word-break:break-all;max-height:440px;overflow-y:auto;line-height:1.6}
.rj::-webkit-scrollbar{width:5px}.rj::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:3px}

@media(max-width:580px){
  .wrap{padding:28px 11px 60px}.card{padding:20px 13px 16px}
  .r2,.r3,.r2e{grid-template-columns:1fr}
  .pr{grid-template-columns:26px 1fr auto}.psg{display:none}
  .mb{padding:8px 10px;font-size:.54rem}
}
</style>
</head>
<body>
<div class="stars"></div><div class="nebula"></div>
<div class="wrap">

<header>
  <div class="sigil">
    <svg viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="30" stroke="#c9a84c" stroke-width=".5" stroke-dasharray="4 3" opacity=".5"/>
      <circle cx="32" cy="32" r="22" stroke="#c9a84c" stroke-width=".4" opacity=".3"/>
      <line x1="2" y1="32" x2="62" y2="32" stroke="#c9a84c" stroke-width=".4" opacity=".2"/>
      <line x1="32" y1="2" x2="32" y2="62" stroke="#c9a84c" stroke-width=".4" opacity=".2"/>
      <circle cx="32" cy="32" r="2.5" fill="#c9a84c" opacity=".7"/>
      <circle cx="32" cy="9" r="1.5" fill="#c9a84c" opacity=".5"/>
      <circle cx="32" cy="55" r="1.5" fill="#c9a84c" opacity=".5"/>
      <circle cx="9" cy="32" r="1.5" fill="#c9a84c" opacity=".5"/>
      <circle cx="55" cy="32" r="1.5" fill="#c9a84c" opacity=".5"/>
    </svg>
  </div>
  <h1>AstroAPI</h1>
  <p>Астрология · Натальная карта · Гороскоп</p>
</header>

<div class="mbar">
  <button class="mb on" onclick="sw('natal')">☉ Натальная карта</button>
  <button class="mb" onclick="sw('horoscope')">☽ Гороскоп</button>
</div>

<!-- ══ NATAL ══════════════════════════════════════════════════ -->
<div id="p-natal" class="panel on"><div class="card">
  <span class="c tl">✦</span><span class="c tr">✦</span><span class="c bl">✦</span><span class="c br">✦</span>
  <div class="f" style="margin-bottom:14px">
    <label>Тип расчёта</label>
    <select id="n-type">
      <option value="all">Полная карта (планеты + дома + аспекты)</option>
      <option value="positions">Позиции планет</option>
      <option value="house-cusps">Дома (куспиды)</option>
      <option value="aspects">Аспекты</option>
    </select>
  </div>
  <div class="div"><span>✦</span></div>
  <div class="row r2">
    <div class="f"><label>Дата рождения</label><input type="date" id="n-date"/></div>
    <div class="f"><label>Время рождения</label><input type="time" id="n-time" value="12:00"/></div>
  </div>
  <div class="row r3">
    <div class="f"><label>Город рождения</label><input type="text" id="n-city" placeholder="Moscow"/></div>
    <div class="f"><label>Страна</label><input type="text" id="n-country" placeholder="RU" maxlength="2"/></div>
    <div class="f"><label>Имя</label><input type="text" id="n-name" placeholder="Имя"/></div>
  </div>
  <p class="note">Город на латинице: Moscow, Berlin, New York, Paris, Tokyo</p>
  <button class="btn" onclick="doNatal()">✦ &nbsp; Рассчитать натальную карту &nbsp; ✦</button>
  <div class="spin" id="sp-natal"><div class="orbit"></div><p>Считываю звёздные координаты…</p></div>
  <div class="eb" id="er-natal"></div>
</div></div>

<!-- ══ HOROSCOPE ══════════════════════════════════════════════ -->
<div id="p-horoscope" class="panel"><div class="card">
  <span class="c tl">✦</span><span class="c tr">✦</span><span class="c bl">✦</span><span class="c br">✦</span>
  <p class="note" style="margin-bottom:14px">Персональный гороскоп на основе вашей даты рождения</p>
  <div class="div"><span>✦</span></div>
  <div class="row r2">
    <div class="f"><label>Дата рождения</label><input type="date" id="h-date"/></div>
    <div class="f"><label>Время рождения</label><input type="time" id="h-time" value="12:00"/></div>
  </div>
  <div class="row r3">
    <div class="f"><label>Город рождения</label><input type="text" id="h-city" placeholder="Moscow"/></div>
    <div class="f"><label>Страна</label><input type="text" id="h-country" placeholder="RU" maxlength="2"/></div>
    <div class="f"><label>Имя</label><input type="text" id="h-name" placeholder="Имя"/></div>
  </div>
  <div class="f" style="margin-bottom:5px">
    <label>Период</label>
    <select id="h-period">
      <option value="daily">Ежедневный</option>
      <option value="weekly">Еженедельный</option>
      <option value="monthly">Ежемесячный</option>
      <option value="yearly">Ежегодный</option>
    </select>
  </div>
  <button class="btn" onclick="doHoroscope()">✦ &nbsp; Получить персональный гороскоп &nbsp; ✦</button>
  <div class="spin" id="sp-horoscope"><div class="orbit"></div><p>Читаю звёздные послания…</p></div>
  <div class="eb" id="er-horoscope"></div>
</div></div>

<!-- ══ RESULTS ════════════════════════════════════════════════ -->
<div class="res" id="res">
  <div class="div" style="margin:28px 0 20px"><span>✦</span></div>
  <div class="rl" id="rl">✦ &nbsp; Ответ небесного свода &nbsp; ✦</div>
  <div class="tabs" id="tabs"></div>
  <div id="tcs"></div>
</div>
</div>

<script>
const SYM={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇',Chiron:'⚷',Mean_Node:'☊',True_Node:'☊',Ascendant:'Asc',Medium_Coeli:'MC',Descendant:'Dsc',Imum_Coeli:'IC'};
const ROMAN=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
const SIGN_RU={Ari:'Овен',Tau:'Телец',Gem:'Близнецы',Can:'Рак',Leo:'Лев',Vir:'Дева',Lib:'Весы',Sco:'Скорпион',Sag:'Стрелец',Cap:'Козерог',Aqu:'Водолей',Pis:'Рыбы'};

function g(id){return(document.getElementById(id)?.value||'').trim()}
function subj(date,time,city,co,name){
  const[y,mo,d]=date.split('-').map(Number);
  const[h,mi]=(time||'12:00').split(':').map(Number);
  return{name:name||'Subject',birth_data:{year:y,month:mo,day:d,hour:h,minute:mi,second:0,city,country_code:co.toUpperCase()}};
}
const OPT={house_system:'P',language:'en',tradition:'universal',detail_level:'standard',zodiac_type:'Tropic',
  active_points:['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Chiron','Mean_Node','Ascendant','Medium_Coeli'],precision:2};

async function api(path,payload,extra={}){
  const r=await fetch('/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiPath:path,payload,...extra})});
  const txt=await r.text();
  let d;try{d=JSON.parse(txt)}catch(e){throw new Error('Ответ сервера: '+txt.substring(0,180))}
  if(!r.ok){const m=d.detail||d.error||d.message;throw new Error(typeof m==='string'?m:JSON.stringify(m).substring(0,200))}
  return d;
}

function sw(mode){
  document.querySelectorAll('.mb').forEach((b,i)=>b.classList.toggle('on',['natal','horoscope'][i]===mode));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+mode).classList.add('on');
  document.getElementById('res').classList.remove('on');
}
function spin(id,on){document.getElementById('sp-'+id).classList.toggle('on',on)}
function err(id,msg){const e=document.getElementById('er-'+id);e.textContent=msg;e.classList.toggle('on',!!msg)}
async function run(id,fn){
  err(id,'');spin(id,true);
  document.getElementById('res').classList.remove('on');
  const btn=document.querySelector('#p-'+id+' .btn');if(btn)btn.disabled=true;
  try{await fn()}catch(e){err(id,'Ошибка: '+e.message)}
  finally{spin(id,false);if(btn)btn.disabled=false}
}

// ── NATAL ─────────────────────────────────────────────────────
async function doNatal(){await run('natal',async()=>{
  const type=g('n-type')||'all',date=g('n-date'),city=g('n-city'),co=g('n-country');
  if(!date||!city||!co)throw new Error('Заполните дату, город и страну');
  const s=subj(date,g('n-time'),city,co,g('n-name'));
  let data;
  if(type==='all'){
    const[pos,houses,asp]=await Promise.all([
      api('/api/v3/data/positions',{subject:s,options:OPT}),
      api('/api/v3/data/house-cusps',{subject:s,options:OPT}),
      api('/api/v3/data/aspects',{subject:s,options:OPT})
    ]);
    data={positions:pos,houses:houses,aspects:asp};
  }else{
    data=await api('/api/v3/data/'+type,{subject:s,options:OPT});
  }
  show(data,'Натальная карта — '+(g('n-name')||city));
})}

// ── HOROSCOPE ─────────────────────────────────────────────────
async function doHoroscope(){await run('horoscope',async()=>{
  const date=g('h-date'),city=g('h-city'),co=g('h-country');
  if(!date||!city||!co)throw new Error('Заполните дату, город и страну');
  const period=document.getElementById('h-period').value;
  const s=subj(date,g('h-time'),city,co,g('h-name'));
  const data=await api('/api/v3/horoscope/personal/'+period,{
    subject:s,
    horoscope_type:period,
    language:'en',
    tradition:'universal',
    include_transits:true,
    include_progressions:false
  });
  show(data,'Гороскоп — '+(g('h-name')||city));
})}

document.querySelectorAll('input[maxlength="2"]').forEach(el=>el.addEventListener('input',()=>{el.value=el.value.toUpperCase()}));

// ══ SHOW / TABS ═══════════════════════════════════════════════
function show(data,title){
  document.getElementById('rl').textContent='✦  '+title+'  ✦';
  const T=[];
  // multi-call result
  if(data.positions||data.houses||data.aspects){
    const pos=data.positions?.data||data.positions;
    const hd=data.houses?.data||data.houses;
    const asd=data.aspects?.data||data.aspects;
    if(pos){const pl=pl_arr(pos);if(pl.length)T.push({l:'Планеты',h:rPl(pl)})}
    if(hd){const hs=hs_arr(hd);if(hs.length)T.push({l:'Дома',h:rH(hs)})}
    if(asd){const as=asd.aspects;if(as?.length)T.push({l:'Аспекты',h:rA(as)})}
  }else{
    const inner=data.data||data;
    const pl=pl_arr(inner);if(pl.length)T.push({l:'Планеты',h:rPl(pl)});
    const hs=hs_arr(inner);if(hs.length)T.push({l:'Дома',h:rH(hs)});
    const as=inner.aspects||inner.synastry_aspects;if(as?.length)T.push({l:'Аспекты',h:rA(as)});
    const ht=inner.horoscope||inner.prediction||inner.forecast||inner.content||inner.text||inner.description;
    if(ht)T.push({l:'Гороскоп',h:rHoro(inner,ht)});
  }
  if(!T.length)T.push({l:'Данные',h:rKV(flat(data.data||data))});
  T.push({l:'JSON',h:'<pre class="rj">'+JSON.stringify(data,null,2)+'</pre>'});
  buildTabs(T);
}

function buildTabs(T){
  const tabs=document.getElementById('tabs'),tcs=document.getElementById('tcs');
  tabs.innerHTML='';tcs.innerHTML='';
  T.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='tb'+(i===0?' on':'');b.textContent=t.l;
    b.onclick=()=>{document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));
      document.querySelectorAll('.tc').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');document.getElementById('tc'+i).classList.add('on')};
    tabs.appendChild(b);
    const dv=document.createElement('div');dv.className='tc'+(i===0?' on':'');dv.id='tc'+i;dv.innerHTML=t.h;tcs.appendChild(dv);
  });
  document.getElementById('res').classList.add('on');
  document.getElementById('res').scrollIntoView({behavior:'smooth',block:'start'});
}

function pl_arr(obj){
  if(!obj)return[];
  const pl=obj.positions||obj.planets||obj.celestial_bodies;
  if(Array.isArray(pl))return pl;
  if(pl&&typeof pl==='object')return Object.entries(pl).map(([n,v])=>({name:n,...v}));
  return[];
}
function hs_arr(obj){
  if(!obj)return[];
  const hs=obj.houses||obj.house_cusps;
  if(Array.isArray(hs))return hs;
  if(hs&&typeof hs==='object')return Object.values(hs);
  return[];
}
function sign_ru(s){return SIGN_RU[s]||s||''}

function rPl(list){
  return '<div class="pg">'+list.map(p=>{
    const sym=SYM[p.name]||'★';
    const sign=sign_ru(p.sign||p.zodiac_sign);
    const deg=p.degree!=null?Number(p.degree).toFixed(2)+'°':p.absolute_longitude!=null?Number(p.absolute_longitude).toFixed(2)+'°':'';
    const house=p.house!=null?'· д.'+p.house:'';
    const retro=(p.retrograde||p.is_retrograde)?'<span class="rt">℞</span>':'';
    return '<div class="pr"><div class="ps">'+sym+'</div><div class="pn">'+(p.name||'')+retro+'</div><div class="psg">'+sign+(sign&&house?' ':'')+house+'</div><div class="pd">'+deg+'</div></div>';
  }).join('')+'</div>';
}
function rH(list){
  return '<div class="hg">'+list.map((x,i)=>{
    const sign=sign_ru(x.sign||x.zodiac_sign);
    const deg=x.degree!=null?Number(x.degree).toFixed(1)+'°':x.absolute_longitude!=null?Number(x.absolute_longitude).toFixed(1)+'°':'';
    return '<div class="hc"><div class="hn">Дом '+(ROMAN[i]||i+1)+'</div><div class="hsg">'+sign+'</div><div class="hd">'+deg+'</div></div>';
  }).join('')+'</div>';
}
function rA(asp){
  return '<div class="al">'+asp.map(a=>{
    const type=(a.aspect||a.type||a.name||'').toLowerCase();
    const cls=['trine','sextile','conjunction','opposition','square'].includes(type)?type:'other';
    const p1=a.p1_name||a.planet1||a.body1||'';
    const p2=a.p2_name||a.planet2||a.body2||'';
    const orb=a.orb!=null?'orb '+Number(a.orb).toFixed(2)+'°':'';
    return '<div class="ai"><span class="at '+cls+'">'+type+'</span><span class="ap">'+p1+' — '+p2+'</span><span class="ao">'+orb+'</span></div>';
  }).join('')+'</div>';
}
function rHoro(obj,text){
  const cats=obj.categories||obj.sections;
  if(cats&&typeof cats==='object'){
    let h='<div class="hcard">';
    if(obj.sign)h+='<div class="htitle">'+document.getElementById('h-sign')?.selectedOptions[0]?.text+' — '+({'daily':'Сегодня','weekly':'Эта неделя','monthly':'Этот месяц','yearly':'Этот год'}[obj.period||document.getElementById('h-period')?.value]||'')+'</div>';
    h+='<div class="hcats">';
    const catNames={love:'Любовь',career:'Карьера',health:'Здоровье',finance:'Финансы',general:'Общее',spirituality:'Духовность',family:'Семья'};
    Object.entries(cats).forEach(([k,v])=>{h+='<div class="hcat"><div class="hcatn">'+(catNames[k.toLowerCase()]||k)+'</div><div class="hcatt">'+v+'</div></div>';});
    h+='</div>';
    const lk=[];
    if(obj.lucky_number!=null)lk.push('Число удачи: <span>'+obj.lucky_number+'</span>');
    if(obj.lucky_color)lk.push('Цвет: <span>'+obj.lucky_color+'</span>');
    if(obj.compatible_signs?.length)lk.push('Совместимы: <span>'+(Array.isArray(obj.compatible_signs)?obj.compatible_signs.join(', '):obj.compatible_signs)+'</span>');
    if(lk.length)h+='<div class="hlk">'+lk.map(l=>'<div class="hlki">'+l+'</div>').join('')+'</div>';
    return h+'</div>';
  }
  if(typeof text==='string')return '<div class="hcard"><div class="hcatt" style="line-height:1.9;font-size:.97rem">'+text.replace(/\n/g,'<br/>')+'</div></div>';
  return rKV(flat(obj));
}
function rKV(obj){return'<div class="kvg">'+Object.entries(obj).map(([k,v])=>'<div class="kvi"><span class="kvk">'+k+'</span><span class="kvv">'+String(v)+'</span></div>').join('')+'</div>'}
function flat(obj,p=''){
  const r={};if(!obj||typeof obj!=='object')return r;
  Object.entries(obj).forEach(([k,v])=>{
    const key=p?p+'.'+k:k;
    if(v&&typeof v==='object'&&!Array.isArray(v))Object.assign(r,flat(v,key));
    else if(!Array.isArray(v)&&v!=null)r[key]=String(v);
  });
  return r;
}
</script>
