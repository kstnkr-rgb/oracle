```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroAPI</title>

<style>
body{
background:#06060f;
color:#eee;
font-family:serif;
padding:40px;
max-width:900px;
margin:auto
}

h1{
color:#d7b45c;
margin-bottom:30px
}

.card{
border:1px solid #333;
padding:20px;
margin-bottom:30px
}

label{
display:block;
margin-top:10px;
font-size:14px
}

input,select{
width:100%;
padding:6px;
margin-top:4px;
background:#111;
color:#eee;
border:1px solid #333
}

button{
margin-top:15px;
padding:10px 20px;
background:#d7b45c;
border:none;
cursor:pointer
}

pre{
background:#000;
padding:20px;
overflow:auto;
max-height:400px
}

.error{
color:#ff6b6b;
margin-top:10px
}
</style>
</head>

<body>

<h1>AstroAPI</h1>

<div class="card">

<h3>Натальная карта</h3>

<label>Дата рождения</label>
<input type="date" id="n-date">

<label>Время рождения</label>
<input type="time" id="n-time" value="12:00">

<label>Город</label>
<input type="text" id="n-city" placeholder="Moscow">

<label>Страна</label>
<input type="text" id="n-country" placeholder="RU">

<button onclick="doNatal()">Рассчитать</button>

<div id="err-natal" class="error"></div>

</div>


<div class="card">

<h3>Гороскоп</h3>

<label>Знак</label>

<select id="h-sign">
<option value="aries">Овен</option>
<option value="taurus">Телец</option>
<option value="gemini">Близнецы</option>
<option value="cancer">Рак</option>
<option value="leo">Лев</option>
<option value="virgo">Дева</option>
<option value="libra">Весы</option>
<option value="scorpio">Скорпион</option>
<option value="sagittarius">Стрелец</option>
<option value="capricorn">Козерог</option>
<option value="aquarius">Водолей</option>
<option value="pisces">Рыбы</option>
</select>

<label>Период</label>

<select id="h-period">
<option value="daily">Ежедневный</option>
<option value="weekly">Еженедельный</option>
<option value="monthly">Ежемесячный</option>
<option value="yearly">Ежегодный</option>
</select>

<button onclick="doHoroscope()">Получить</button>

<div id="err-horoscope" class="error"></div>

</div>


<div class="card">

<h3>Фаза Луны</h3>

<label>Город</label>
<input type="text" id="m-city" placeholder="Berlin">

<label>Страна</label>
<input type="text" id="m-country" placeholder="DE">

<button onclick="doMoon()">Получить фазу</button>

<div id="err-moon" class="error"></div>

</div>


<div class="card">

<h3>Результат</h3>

<pre id="result"></pre>

</div>


<script>

function g(id){
return document.getElementById(id).value.trim()
}


async function api(path,payload={},method='POST'){

const r=await fetch('/proxy',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
apiPath:path,
payload,
method
})
})

const txt=await r.text()

let data

try{
data=JSON.parse(txt)
}catch{
throw new Error(txt)
}

if(!r.ok){
throw new Error(data.error || JSON.stringify(data))
}

return data
}


function show(data){
document.getElementById('result').textContent=
JSON.stringify(data,null,2)
}



async function doNatal(){

document.getElementById('err-natal').textContent=''

try{

const date=g('n-date')
const time=g('n-time') || '12:00'
const city=g('n-city')
const co=g('n-country')

if(!date||!city||!co){
throw new Error('Введите дату, город и страну')
}

const[y,m,d]=date.split('-').map(Number)
const[h,mi]=time.split(':').map(Number)

const payload={
subject:{
name:'User',
birth_data:{
year:y,
month:m,
day:d,
hour:h,
minute:mi,
second:0,
city,
country_code:co.toUpperCase()
}
},
options:{
house_system:'P',
language:'en',
zodiac_type:'Tropic'
}
}

const data=await api('/api/v3/data/positions',payload)

show(data)

}catch(e){
document.getElementById('err-natal').textContent=e.message
}

}



async function doHoroscope(){

document.getElementById('err-horoscope').textContent=''

try{

const sign=document.getElementById('h-sign').value
const period=document.getElementById('h-period').value

const path='/api/v3/horoscopes/'+period+'/'+sign

const data=await api(path,null,'GET')

show(data)

}catch(e){
document.getElementById('err-horoscope').textContent=e.message
}

}



async function doMoon(){

document.getElementById('err-moon').textContent=''

try{

const city=g('m-city')
const co=g('m-country')

if(!city||!co){
throw new Error('Введите город и страну')
}

const payload={
location:{
city,
country_code:co.toUpperCase()
}
}

const data=await api(
'/api/v3/data/lunar-metrics',
payload,
'POST'
)

show(data)

}catch(e){
document.getElementById('err-moon').textContent=e.message
}

}

</script>

</body>
</html>
```
